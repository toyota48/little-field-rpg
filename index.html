<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Little Field RPG</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%232f7d6b'/%3E%3Cpath d='M8 23h16v4H8zM10 8h12v15H10z' fill='%23fffaf1'/%3E%3Cpath d='M14 11h4v4h-4z' fill='%23b84f42'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="./styles.css">
    <script src="./game.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">2D Browser RPG</p>
          <h1>Little Field RPG</h1>
        </div>
        <button id="menuButton" class="mobile-menu-button" type="button" aria-controls="mobileMenuPanel" aria-expanded="false">メニュー</button>
        <div class="save-controls" aria-label="save controls">
          <button id="saveButton" type="button">セーブ</button>
          <button id="loadButton" type="button">ロード</button>
          <button id="resetButton" type="button" class="subtle">最初から</button>
        </div>
      </header>

      <section id="mobileMenuPanel" class="mobile-menu-panel" aria-label="mobile menu" hidden>
        <div class="mobile-menu-heading">
          <h2>メニュー</h2>
          <button id="menuCloseButton" type="button" class="subtle">閉じる</button>
        </div>

        <div class="mobile-menu-actions" aria-label="save controls">
          <button id="menuSaveButton" type="button">セーブ</button>
          <button id="menuLoadButton" type="button">ロード</button>
          <button id="menuResetButton" type="button" class="subtle">最初から</button>
        </div>

        <section class="mobile-status-panel" aria-label="mobile status">
          <div class="panel-heading">
            <h2>ステータス</h2>
            <span id="mobileModeValue" class="mode-pill">探索中</span>
          </div>

          <dl class="stats-grid mobile-stats-grid">
            <div>
              <dt>マップ</dt>
              <dd id="mobileMapValue">町</dd>
            </div>
            <div>
              <dt>Lv</dt>
              <dd id="mobileLevelValue">1</dd>
            </div>
            <div>
              <dt>攻撃力</dt>
              <dd id="mobileAttackValue">46</dd>
            </div>
            <div>
              <dt>防御力</dt>
              <dd id="mobileDefenseValue">26</dd>
            </div>
            <div>
              <dt>賢さ</dt>
              <dd id="mobileWisdomValue">34</dd>
            </div>
            <div>
              <dt>素早さ</dt>
              <dd id="mobileAgilityValue">30</dd>
            </div>
            <div>
              <dt>器用さ</dt>
              <dd id="mobileDexterityValue">30</dd>
            </div>
            <div>
              <dt>お金</dt>
              <dd><span id="mobileGoldValue">0</span> G</dd>
            </div>
            <div>
              <dt>薬草</dt>
              <dd><span id="mobileHerbValue">1</span> 個</dd>
            </div>
          </dl>

          <div class="meter-row">
            <span id="mobileHpText">HP 30 / 30</span>
            <div class="meter hp-meter" aria-hidden="true">
              <span id="mobileHpBar"></span>
            </div>
          </div>

          <div class="meter-row">
            <span id="mobileMpText">MP 10 / 10</span>
            <div class="meter mp-meter" aria-hidden="true">
              <span id="mobileMpBar"></span>
            </div>
          </div>

          <div class="meter-row">
            <span id="mobileExpText">EXP 0 / 12</span>
            <div class="meter exp-meter" aria-hidden="true">
              <span id="mobileExpBar"></span>
            </div>
          </div>
        </section>
      </section>

      <section class="game-layout" aria-label="game area">
        <div class="playfield">
          <div id="screenFrame" class="screen-frame">
            <canvas id="gameCanvas" width="512" height="384" aria-label="game screen"></canvas>
            <div id="fieldMapBadge" class="field-map-badge">町</div>
            <div id="fieldFade" class="field-fade" hidden></div>
            <section id="fieldMessage" class="field-message" aria-live="polite" hidden>
              <div id="messageSpeaker" class="message-speaker"></div>
              <p id="messageText"></p>
              <div id="messageChoices" class="message-choices" hidden>
                <button id="messageYesButton" type="button">はい</button>
                <button id="messageNoButton" type="button" class="subtle">いいえ</button>
              </div>
              <span id="messagePrompt" class="message-prompt" aria-hidden="true">▼</span>
            </section>
          </div>
          <section class="touch-controls" aria-label="mobile movement controls">
            <div class="dpad" aria-label="movement pad">
              <button class="touch-button dpad-up" type="button" data-move="up" aria-label="上へ移動">▲</button>
              <button class="touch-button dpad-left" type="button" data-move="left" aria-label="左へ移動">◀</button>
              <button class="touch-button dpad-right" type="button" data-move="right" aria-label="右へ移動">▶</button>
              <button class="touch-button dpad-down" type="button" data-move="down" aria-label="下へ移動">▼</button>
            </div>
            <div id="touchBattleStatus" class="touch-battle-status" aria-live="polite" hidden>
              <div>
                <span id="touchHpText">HP 30 / 30</span>
                <div class="touch-meter touch-hp-meter" aria-hidden="true">
                  <span id="touchHpBar"></span>
                </div>
              </div>
              <div>
                <span id="touchMpText">MP 10 / 10</span>
                <div class="touch-meter touch-mp-meter" aria-hidden="true">
                  <span id="touchMpBar"></span>
                </div>
              </div>
            </div>
            <button id="touchInteractButton" class="touch-button touch-action" type="button">決定</button>
            <div id="battleTouchMenu" class="battle-touch-menu" hidden>
              <button id="touchFightButton" class="battle-command" type="button">たたかう</button>
              <button id="touchItemButton" class="battle-command" type="button">どうぐ</button>
              <button id="touchRunButton" class="battle-command" type="button">逃げる</button>
              <button id="touchAttackButton" class="battle-command" type="button">攻撃</button>
              <button id="touchSkillButton" class="battle-command" type="button">特技</button>
              <button id="touchMagicButton" class="battle-command" type="button">魔法</button>
              <button id="touchBackButton" class="battle-command" type="button">戻る</button>
            </div>
          </section>
        </div>

        <aside class="hud" aria-label="status and commands">
          <section class="panel status-panel">
            <div class="panel-heading">
              <h2>ステータス</h2>
              <span id="modeValue" class="mode-pill">探索中</span>
            </div>

            <dl class="stats-grid">
              <div>
                <dt>マップ</dt>
                <dd id="mapValue">町</dd>
              </div>
              <div>
                <dt>Lv</dt>
                <dd id="levelValue">1</dd>
              </div>
              <div>
                <dt>攻撃力</dt>
                <dd id="attackValue">46</dd>
              </div>
              <div>
                <dt>防御力</dt>
                <dd id="defenseValue">26</dd>
              </div>
              <div>
                <dt>賢さ</dt>
                <dd id="wisdomValue">34</dd>
              </div>
              <div>
                <dt>素早さ</dt>
                <dd id="agilityValue">30</dd>
              </div>
              <div>
                <dt>器用さ</dt>
                <dd id="dexterityValue">30</dd>
              </div>
              <div>
                <dt>お金</dt>
                <dd><span id="goldValue">0</span> G</dd>
              </div>
              <div>
                <dt>薬草</dt>
                <dd><span id="herbValue">1</span> 個</dd>
              </div>
            </dl>

            <div class="meter-row">
              <span id="hpText">HP 30 / 30</span>
              <div class="meter hp-meter" aria-hidden="true">
                <span id="hpBar"></span>
              </div>
            </div>

            <div class="meter-row">
              <span id="mpText">MP 10 / 10</span>
              <div class="meter mp-meter" aria-hidden="true">
                <span id="mpBar"></span>
              </div>
            </div>

            <div class="meter-row">
              <span id="expText">EXP 0 / 12</span>
              <div class="meter exp-meter" aria-hidden="true">
                <span id="expBar"></span>
              </div>
            </div>
          </section>

          <section id="enemyPanel" class="panel enemy-panel" hidden>
            <div class="panel-heading">
              <h2 id="enemyName">敵</h2>
              <span id="enemyHpText">HP 0 / 0</span>
            </div>
            <div class="meter enemy-meter" aria-hidden="true">
              <span id="enemyHpBar"></span>
            </div>
          </section>

          <section class="panel command-panel">
            <h2>コマンド</h2>
            <div id="exploreCommandGrid" class="command-grid">
              <button id="interactButton" type="button">決定</button>
            </div>
            <div id="battleRootMenu" class="command-grid battle-root-grid" hidden>
              <button id="fightButton" type="button">たたかう</button>
              <button id="itemButton" type="button">どうぐ</button>
              <button id="runButton" type="button">逃げる</button>
            </div>
            <div id="battleActionMenu" class="command-grid battle-action-grid" hidden>
              <button id="attackButton" type="button">攻撃</button>
              <button id="skillButton" type="button">特技</button>
              <button id="magicButton" type="button">魔法</button>
              <button id="backButton" type="button" class="subtle">戻る</button>
            </div>
          </section>

          <section class="panel log-panel" hidden>
            <h2>ログ</h2>
            <ul id="logList" aria-live="polite"></ul>
          </section>
        </aside>
      </section>
    </main>
  </body>
</html>
